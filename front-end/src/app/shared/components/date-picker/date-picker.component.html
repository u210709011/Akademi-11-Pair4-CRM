<div class="date-picker">
  <button type="button" class="date-input" [class.open]="isOpen()" (click)="togglePanel()">
    <span class="date-value">{{ displayValue() }}</span>
    <svg class="calendar-icon" viewBox="0 0 24 24" aria-hidden="true">
      <rect x="3" y="5" width="18" height="16" rx="2" />
      <path d="M8 3v4M16 3v4M3 10h18" />
    </svg>
  </button>

  @if (isOpen()) {
    <div class="date-panel">
      <div class="date-panel-header">
        <button type="button" class="nav-btn" (click)="previousMonth()">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6l-6 6 6 6" /></svg>
        </button>
        <span class="period-box month-box">{{ monthLabel() }}</span>
        <span class="period-box year-box">{{ yearLabel() }}</span>
        <button type="button" class="nav-btn" (click)="nextMonth()">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6" /></svg>
        </button>
      </div>

      <div class="weekday-row">
        @for (label of weekdayLabels; track $index) {
          <span class="weekday-cell">{{ label }}</span>
        }
      </div>

      <div class="day-grid">
        @for (day of calendarDays(); track $index) {
          @if (day) {
            <button
              type="button"
              class="day-cell"
              [class.selected]="isSelectedDay(day)"
              (click)="selectDay(day)"
            >
              {{ day }}
            </button>
          } @else {
            <span class="day-cell empty"></span>
          }
        }
      </div>
    </div>
  }
</div>

<nav class="navbar">

  <div class="navbar-left">
    <button type="button" class="menu-btn" aria-label="Menu" (click)="menuToggle.emit()">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>

    <div class="logo-badge">
      <img class="logo-image" src="assets/etiya-logo.png" alt="Etiya">
    </div>
  </div>

  <div class="navbar-right">

    <div class="lang-switcher">
      <button class="language-btn" type="button" (click)="toggleLangMenu()">
        <span class="language-btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10" />
            <path d="M2 12h20M12 2a15 15 0 0 1 0 20 15 15 0 0 1 0-20Z" />
          </svg>
        </span>
        {{ i18n.lang().toUpperCase() }}
      </button>
    </div>

    <span class="divider" aria-hidden="true"></span>

    <div class="user-title">
      <span>Mobility - Resp. Sales Rep.</span>
    </div>
    
    <span class="divider" aria-hidden="true"></span>

    <div class="profile-switcher" [class.open]="profileMenuOpen()">
      <button type="button" class="profile" (click)="toggleProfileMenu()">
        <span class="avatar">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="4" />
            <path d="M20 21a8 8 0 0 0-16 0" />
          </svg>
        </span>
        <span class="profile-name">John</span>
        <svg class="chevron-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6" /></svg>
      </button>

      @if (profileMenuOpen()) {
        <div class="profile-menu">
          <button type="button" class="profile-option">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="8" r="4" />
              <path d="M20 21a8 8 0 0 0-16 0" />
            </svg>
            {{ i18n.t('navbar.myProfile') }}
          </button>
          <button type="button" class="profile-option logout">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <path d="M16 17l5-5-5-5" />
              <path d="M21 12H9" />
            </svg>
            {{ i18n.t('navbar.logout') }}
          </button>
        </div>
      }
    </div>

  </div>

</nav>

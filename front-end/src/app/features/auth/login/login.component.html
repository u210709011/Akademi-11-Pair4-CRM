<div class="login-card">

  <span class="badge">{{ i18n.t('login.badge').toUpperCase() }}</span>

  <h2>{{ i18n.t('login.title') }}</h2>
  <p class="subtitle">{{ i18n.t('login.subtitle') }}</p>

  <form class="login-form" [formGroup]="loginForm" (ngSubmit)="submit()">

    @if (loginError()) {
      <div class="error-wrapper" role="alert">
        <svg class="error-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3 1 21h22L12 3Zm0 6v6m0 3h.01" />
        </svg>
        <p class="error-message">{{ i18n.t('login.wrongCredentials') }}</p>
      </div>
    }

    <div class="form-group">
      <label for="username">{{ i18n.t('login.usernameLabel') }} <span class="required">*</span></label>
      <div class="input-wrapper">
        <svg class="input-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="8" r="4" />
          <path d="M20 21a8 8 0 0 0-16 0" />
        </svg>
        <input
          id="username"
          type="text"
          formControlName="username"
          maxlength="50"
          [placeholder]="i18n.t('login.usernamePlaceholder')"
          autocomplete="username"
          (blur)="trimUsername()"
        >
      </div>
    </div>

    <div class="form-group">
      <label for="password">{{ i18n.t('login.passwordLabel') }} <span class="required">*</span></label>
      <div class="input-wrapper">
        <svg class="input-icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="4" y="11" width="16" height="10" rx="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        <input
          id="password"
          [type]="showPassword() ? 'text' : 'password'"
          formControlName="password"
          maxlength="50"
          [placeholder]="i18n.t('login.passwordPlaceholder')"
          autocomplete="current-password"
        >
        <button
          type="button"
          class="toggle-password"
          (click)="togglePassword()"
          [attr.aria-label]="showPassword() ? i18n.t('login.hidePassword') : i18n.t('login.showPassword')"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5c-5 0-9.3 3.1-11 7 1.7 3.9 6 7 11 7s9.3-3.1 11-7c-1.7-3.9-6-7-11-7Zm0 11.5A4.5 4.5 0 1 1 12 7.5a4.5 4.5 0 0 1 0 9Z" />
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="submit-btn" [disabled]="loginForm.invalid">
      <span class="submit-btn-label">{{ i18n.t('login.submit') }}</span>
      <svg class="submit-btn-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M13 5l7 7-7 7M5 12h14" />
      </svg>
    </button>

  </form>

  <footer class="footer">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M17 9V7a5 5 0 0 0-10 0v2a3 3 0 0 0-3 3v7a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-7a3 3 0 0 0-3-3ZM9 7a3 3 0 0 1 6 0v2H9Z" />
    </svg>
    {{ i18n.t('login.demoLogin') }} &mdash; <strong>salesperson</strong> / <strong>password</strong>
  </footer>

</div>

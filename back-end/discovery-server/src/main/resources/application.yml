spring:
  application:
    name: discovery-server
  profiles:
    # Aktif profil configs/discovery-server/ altindaki hangi dosyanin yuklenecegini belirler
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    # Config Server ayakta degilse de uygulama asagidaki yerel varsayilanlarla acilabilsin diye "optional"
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

# Config Server'a ulasilamazsa kullanilacak yerel varsayilanlar (asil degerler configs/discovery-server/ altindadir)
server:
  port: 8761

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

spring:
  application:
    name: discovery-server
  profiles:
    # Aktif profil configs/discovery-server/ altindaki hangi dosyanin yuklenecegini belirler
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    # Config Server zorunludur: ayakta degilse (veya bu import basarisiz olursa) uygulama
    # BASLAMAZ. Yerel varsayilan/fallback deger tutulmaz - asil degerler configs/discovery-server/ altindadir.
    import: configserver:${CONFIG_SERVER_URL:http://localhost:8888}


server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          # Ortak dosyalar configs/ kokunde (application[-profil].yml),
          # servise ozel dosyalar configs/<servis-adi>/ alt klasorundedir.
          # {application} yer tutucusu, istegi yapan servisin adiyla degistirilir.
          # Farkli bir konum icin CONFIGS_PATH ortam degiskeni verilebilir;
          # ileride git backend'e gecmek icin "native" profili kaldirip
          # spring.cloud.config.server.git.uri tanimlanmalidir.
          search-locations:
            - ${CONFIGS_PATH:file:${user.dir}/../configs}
            - ${CONFIGS_PATH:file:${user.dir}/../configs}/{application}

management:
  endpoints:
    web:
      exposure:
        include: health,info

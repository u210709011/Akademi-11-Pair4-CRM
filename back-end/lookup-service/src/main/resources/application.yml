spring:
  application:
    name: lookup-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  # Config Server ayakta degilse (ornn. mvn test tek basina calistirilirken) DataSource/
  # JwtDecoder bean'leri hic kurulamaz ve @SpringBootTest context yuklemesi patlar - bu
  # yuzden podman compose ile calisan lokal altyapiya isaret eden bir varsayilan burada da tutulur.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lookup_db}
    username: ${DB_USERNAME:crm}
    password: ${DB_PASSWORD:crm}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/crm}

server:
  # Gateway'in ekledigi X-Forwarded-* header'larina guven - bkz. customer-service/application.yml aciklamasi.
  forward-headers-strategy: framework

spring:
  application:
    name: contact-info-service
  profiles:
    # Aktif profil configs/contact-info-service/ altindaki hangi dosyanin yuklenecegini belirler
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    # Config Server ayakta degilse de uygulama asagidaki yerel varsayilanlarla acilabilsin diye "optional"
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

# Config Server'a ulasilamazsa kullanilacak yerel varsayilanlar (asil degerler configs/contact-info-service/ altindadir)
server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

spring:
  application:
    name: contact-info-service
  profiles:
    # Aktif profil configs/contact-info-service/ altindaki hangi dosyanin yuklenecegini belirler
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    # Config Server zorunludur: ayakta degilse (veya bu import basarisiz olursa) uygulama
    # BASLAMAZ. Yerel varsayilan/fallback deger tutulmaz - asil degerler configs/contact-info-service/ altindadir.
    import: configserver:${CONFIG_SERVER_URL:http://localhost:8888}

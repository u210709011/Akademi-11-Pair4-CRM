# Tum servisler icin ortak (paylasilan) konfigurasyon.
# Servise ozel dosyalar: <spring.application.name>.yml

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

keycloak:
  # Keycloak realm'inin issuer adresi (compose ile 8180 portunda calisir)
  issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/crm}

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

spring:
  application:
    name: api-gateway
  profiles:
    # Aktif profil configs/ altindaki hangi ortam dosyalarinin yuklenecegini belirler (dev, prod, ...)
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    # Config Server ayakta degilse de uygulama lokal degerlerle acilabilsin diye "optional"
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

# Config Server'a ulasilamazsa kullanilacak yerel varsayilan (asil deger configs/ altindadir)
spring.security.oauth2.resourceserver.jwt.issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/crm}

# /api/v1/auth/** ucundan Keycloak'a token istegi atarken kullanilan confidential client.
keycloak:
  client-id: ${KEYCLOAK_CLIENT_ID:crm-client}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:crm-client-secret}

# Angular dev server'in (localhost:4200) gateway'e (localhost:8080) istek atabilmesi icin CORS izni.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

# Tek bir Swagger UI'da (http://localhost:8080/swagger-ui.html) tum servisler:
# gateway'in kendi /v3/api-docs'u + SwaggerAggregatorConfig'in ayni-origin'e
# tasidigi diger servislerin dokumanlari, ust-sagdaki dropdown'dan secilir.
springdoc:
  swagger-ui:
    urls:
      - name: API Gateway (Auth)
        url: /v3/api-docs
      - name: Customer Service
        url: /v3/api-docs/customer-service
      - name: Contact Info Service
        url: /v3/api-docs/contact-info-service
      - name: Lookup Service
        url: /v3/api-docs/lookup-service

spring:
  application:
    name: api-gateway
  profiles:
    # Aktif profil configs/ altindaki hangi ortam dosyalarinin yuklenecegini belirler (dev, prod, ...)
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    # Config Server zorunludur: ayakta degilse (veya bu import basarisiz olursa) uygulama
    # BASLAMAZ. Yerel varsayilan/fallback deger tutulmaz - asil degerler configs/ altindadir.
    import: configserver:${CONFIG_SERVER_URL:http://localhost:8888}

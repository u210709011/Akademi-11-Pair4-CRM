# Prod ortami: adresler ortam degiskenlerinden gelir, varsayilanlar container aglarina goredir.

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://discovery-server:8761/eureka}

keycloak:
  issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8180/realms/crm}

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

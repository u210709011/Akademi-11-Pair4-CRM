# Customer Service - test ortami.
# Test altyapisinin adresleri netlestiginde asagidaki degerler guncellenir.

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/customer_db}
    username: ${DB_USERNAME:crm}
    password: ${DB_PASSWORD:crm}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

logging:
  level:
    com.etiya.crm.customerservice: INFO

# Lookup Service - tum ortamlar icin gecerli ortak konfigurasyon.
# Ortama ozel degerler: lookup-service-dev.yml / lookup-service-test.yml / lookup-service-prod.yml

server:
  port: 8082

eureka:
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.issuer-uri}

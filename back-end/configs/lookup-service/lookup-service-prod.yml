# Lookup Service - prod ortami: adresler ortam degiskenlerinden gelir,
# varsayilanlar container agindaki servis adlarina goredir.

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://discovery-server:8761/eureka}

keycloak:
  issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8180/realms/crm}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/lookup_db}
    username: ${DB_USERNAME:crm}
    password: ${DB_PASSWORD:crm}

logging:
  level:
    com.etiya.crm.lookupservice: INFO
